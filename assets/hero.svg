<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220" role="img" aria-label="AutoReplace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#12202a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="220" fill="url(#bg)" rx="12"/>
  <text x="400" y="48" text-anchor="middle" fill="#33E5FF" font-family="Segoe UI, Ubuntu, DejaVu Sans, sans-serif" font-size="34" font-weight="700">AutoReplace</text>
  <text x="400" y="76" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Ubuntu, DejaVu Sans, sans-serif" font-size="15">Select · Break · Fill — server-side</text>

  <rect x="280" y="100" width="240" height="70" rx="10" fill="#33E5FF" fill-opacity="0.10" stroke="#33E5FF" stroke-width="3">
    <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.06;0.16;0.06" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- orbit around the box: 280,100 520,100 520,170 280,170 -->
  <circle r="5" fill="#33E5FF">
    <animateMotion dur="4s" repeatCount="indefinite" path="M280,100 L520,100 L520,170 L280,170 Z"/>
  </circle>
  <circle r="4" fill="#3fb950">
    <animateMotion dur="4s" begin="1.3s" repeatCount="indefinite" path="M280,100 L520,100 L520,170 L280,170 Z"/>
  </circle>
  <circle r="4" fill="#ff9f4a">
    <animateMotion dur="4s" begin="2.6s" repeatCount="indefinite" path="M280,100 L520,100 L520,170 L280,170 Z"/>
  </circle>

  <text x="400" y="202" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, Ubuntu, DejaVu Sans, sans-serif" font-size="13">Press Z to open menu</text>
</svg>
